<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小周家族行事曆 | Family Dashboard</title>
    <!-- Google Fonts: Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700;800&display=swap" rel="stylesheet">
    <!-- Lunar Calendar Library -->
    <script src="https://cdn.jsdelivr.net/npm/lunar-javascript/lunar.js"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="dashboard-container">
        <header>
            <div class="clock-area">
                <div id="digital-clock">00:00:00</div>
                <div id="current-date">載入中...</div>
            </div>
            <h2 id="greeting" style="font-weight: 800; color: var(--accent-color); margin-top: 10px;">🏠 小周家族行事曆</h2>
        </header>

        <main class="main-grid">


            <!-- Calendar Card -->
            <section class="card calendar-card">
                <div class="card-title">
                    <span class="icon">📅</span>
                    當月月曆
                </div>
                <div class="calendar-widget">
                    <div class="calendar-nav-header">
                        <button id="prev-month" class="nav-btn">◀</button>
                        <div class="calendar-month-title" id="calendar-month-name">2024年 4月</div>
                        <button id="next-month" class="nav-btn">▶</button>
                    </div>
                    <div class="calendar-grid" id="calendar-grid">
                        <!-- Days generated by JS -->
                    </div>
                </div>
            </section>

            <!-- Birthdays Card -->
            <section class="card birthday-card">
                <div class="card-title">
                    <span class="icon">🎂</span>
                    即將到來的親友壽星
                    <button id="manage-birthdays-btn" class="add-btn" style="margin-left: 10px; background: var(--text-secondary);" title="管理所有生日清單">📋</button>
                    <button id="add-birthday-btn" class="add-btn">+</button>
                </div>
                <ul class="info-list" id="birthday-list">
                    <!-- List items generated by JS -->
                </ul>
            </section>

            <!-- Holidays Card -->
            <section class="card holiday-card">
                <div class="card-title">
                    <span class="icon">🏮</span>
                    即將到來的國定假日
                </div>
                <ul class="info-list" id="holiday-list">
                    <!-- List items generated by JS -->
                </ul>
            </section>

            <!-- To-do List Card -->
            <section class="card todo-card">
                <div class="card-title">
                    <span class="icon">📝</span>
                    今日待辦事項
                </div>
                <ul class="todo-list" id="todo-list">
                    <!-- List items generated by JS -->
                </ul>
            </section>

            <!-- Tomorrow's To-do List Card -->
            <section class="card todo-card">
                <div class="card-title">
                    <span class="icon">📅</span>
                    明日待辦事項
                </div>
                <ul class="todo-list" id="tomorrow-todo-list">
                    <!-- List items generated by JS -->
                </ul>
            </section>

            <!-- Pickup Schedule Card -->
            <section class="card pickup-card">
                <div class="card-title">
                    <span class="icon">🚗</span>
                    今日接送行程
                </div>
                <div id="pickup-info" class="pickup-container">
                    <!-- List items generated by JS -->
                </div>
            </section>
        </main>
    </div>

    <div id="edit-modal" class="modal-overlay" style="display:none;">
        <div class="modal-container">
            <header class="modal-header">
                <h3 id="modal-title">編輯資料</h3>
                <button id="close-modal" class="close-btn">&times;</button>
            </header>
            <div id="modal-body" class="modal-body">
                <!-- 動態注入編輯表格 -->
            </div>
            <footer class="modal-footer">
                <button id="delete-btn" class="btn-danger" style="display:none;">刪除</button>
                <div class="spacer"></div>
                <button id="save-btn" class="btn-primary">儲存</button>
            </footer>
        </div>
    </div>

    <script src="config.js"></script>
    <script src="data.js"></script>
    <script src="app.js"></script>
</body>
</html>
